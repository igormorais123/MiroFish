name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask flask-cors python-dotenv requests

      - name: Run unit tests
        run: |
          python -m pytest tests/test_pagination.py tests/test_translation.py -v
