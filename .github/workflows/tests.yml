name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask flask-cors python-dotenv

      - name: Run unit tests
        run: |
          python -m pytest tests/test_pagination.py tests/test_translation.py -v
