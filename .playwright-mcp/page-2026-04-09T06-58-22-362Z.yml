                - generic [ref=e2834]:
                  - paragraph [ref=e2836]: "Configuracao temporal: A simulação abrange 5 dias (120 horas) para capturar o desenvolvimento da crise política e midiática do caso Banco Master no DF, incluindo reações imediatas e estratégias de médio prazo. O pico noturno reflete discussões políticas e cobertura jornalística após expediente. Agentes mínimos/máximos consideram a diversidade de atores (políticos, instituições, mídia) com atividade variável: órgãos públicos concentram-se no horário comercial, enquanto mídia e políticos mantêm atividade estendida. A madrugada tem baixa atividade, mas eventos urgentes podem ocorrer devido à natureza da crise."
                  - paragraph [ref=e2838]: "Configuracao de eventos: Os tópicos quentes foram extraídos do documento-base, focando nos elementos centrais da crise: fraude financeira (Banco Master), contaminação sistêmica (BRB), envolvimento político (Ibaneis, Celina), crime organizado (PCC), e impacto eleitoral (2026). A direção narrativa sintetiza a convergência desses fatores em uma crise institucional. As postagens iniciais foram criadas para representar diferentes perspectivas dos atores envolvidos, usando os tipos de entidade disponíveis para simular declarações públicas, notícias e posicionamentos que iniciam o debate, alinhados ao objetivo de simular impacto político e midiático."
