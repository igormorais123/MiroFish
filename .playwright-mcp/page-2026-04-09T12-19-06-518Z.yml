            - generic [ref=e317]:
              - generic [ref=e318] [cursor=pointer]:
                - generic [ref=e319]: "03"
                - 'heading "Tendências e Riscos Futuros: Eleições 2026 e Erosão da Confiança Institucional" [level=3] [ref=e320]'
                - img [ref=e989]
              - generic [ref=e991]:
                - paragraph [ref=e992]: A simulação prevê que o caso Banco Master desencadeará uma profunda reconfiguração do cenário político do Distrito Federal, com impactos duradouros que se estenderão até as eleições de 2026 e corroerão a confiança da população nas instituições locais. A crise não se encerra com a renúncia de Ibaneis Rocha; ela se transforma em um fator definidor da disputa eleitoral futura.
                - paragraph [ref=e993]:
                  - strong [ref=e994]: Reconfiguração do cenário eleitoral para 2026
                - paragraph [ref=e995]: A eleição para o governo do DF em 2026 será disputada sob a sombra do escândalo. A simulação indica que o campo político se dividirá entre aqueles que buscarão se distanciar totalmente do governo anterior e aqueles que tentarão capitalizar o sentimento antiestablishment. Partidos tradicionalmente fortes na região, especialmente aqueles associados à administração Ibaneis, enfrentarão um eleitorado desconfiado e punitivo.
                - blockquote [ref=e996]: "\"Um analista político comentou no Twitter: '2026 no DF será um plebiscito sobre corrupção e lavagem de dinheiro. Não há espaço para meias-palavras. Candidatos terão que provar que são outsiders do sistema que permitiu o Master ou apresentar um histórico imaculado.'\""
                - paragraph [ref=e997]: A oposição, inicialmente beneficiada pela crise, também enfrentará riscos. A simulação aponta para uma fragmentação, com o surgimento de novas lideranças e possíveis alianças transversais, desafiando a polarização tradicional. O nome de Celina Leão, mesmo como governadora em exercício, é visto como inviável eleitoralmente, carregando o estigma da crise.
                - blockquote [ref=e998]: "\"Um internauta no Reddit argumentou: 'Celina tentou se descolar, mas ninguém esquece que ela era vice do Ibaneis. Ela é a cara do sistema que falhou. Em 2026, o eleitor vai querir alguém de fora, mesmo que seja um desconhecido com discurso de mudança radical.'\""
                - paragraph [ref=e999]:
                  - strong [ref=e1000]: Erosão profunda da confiança institucional
                - paragraph [ref=e1001]: A confiança do público no Banco de Brasília (BRB) e nas instituições do governo do DF atinge níveis críticos. A percepção de que um banco público foi utilizado em esquemas de lavagem de dinheiro gera uma desconfiança que transcende o financeiro e atinge o político. A simulação prevê uma fuga de correntistas e uma relutância generalizada em utilizar serviços públicos associados ao governo, num fenômeno de rejeição ampla.
                - blockquote [ref=e1002]: "\"Uma pequena empresária, em entrevista simulada, declarou: 'Depois do que aconteceu com o BRB, como confiar em qualquer coisa do governo do DF? Se um banco público é usado para lavar dinheiro, o que mais não está contaminado? Penso até em mudar minha empresa para outro estado.'\""
                - paragraph [ref=e1003]: Esse sentimento se estende ao Legislativo distrital, visto como conivente ou inerte durante a escalada da crise. A demanda por "renovação total" se torna um clamor público, aumentando o risco de eleição de figuras populistas ou sem experiência, prometendo "varrer a velha política".
                - paragraph [ref=e1004]:
                  - strong [ref=e1005]: Riscos futuros e cenários de aprofundamento da crise
                - paragraph [ref=e1006]: "A simulação traça dois cenários principais de risco a partir de 2024:"
                - paragraph [ref=e1007]:
                  - strong [ref=e1008]: "Risco de paralisia administrativa:"
                  - text: O governo de transição, enfraquecido e sob suspeita, tem sua capacidade de implementar políticas públicas severamente limitada. Projetos essenciais para a infraestrutura e o social do DF são paralisados, agravando problemas crônicos e alimentando ainda mais o descontentamento popular.
                - paragraph [ref=e1009]:
                  - strong [ref=e1010]: "Risco de judicialização da política:"
                  - text: As investigações em curso prometem novas delações e revelações ao longo de 2025 e 2026. A simulação prevê que o processo eleitoral será constantemente interrompido por novas acusações, prisões ou vazamentos, criando um ambiente de instabilidade permanente e impedindo um debate focado em propostas.
                - blockquote [ref=e1011]: "\"Um perfil jurídico no Twitter alertou: 'O processo do Master vai ecoar até 2026. Cada nova delação pode derrubar um pré-candidato. A campanha será feita sob a espada de Dâmocles da Operação Lava Jato local.'\""
                - paragraph [ref=e1012]: A oportunidade, contudo, existe para instituições que conseguirem se desvincular claramente do escândalo. A simulação sugere que órgãos de controle que agirem com rigor e transparência, como o Ministério Público do DF e a Polícia Federal, podem experimentar um aumento de sua legitimidade perante a opinião pública, tornando-se atores centrais na reconstrução da confiança, que será um processo lento e doloroso, estendendo-se muito além do pleito de 2026.
