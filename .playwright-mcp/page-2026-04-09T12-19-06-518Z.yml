            - 'heading "Relatório de Previsão Futura: Impactos Políticos e Midiáticos do Caso Banco Master no Distrito Federal (2024-2026)" [level=1] [ref=e298]'
            - paragraph [ref=e299]: A simulação prevê que o caso Banco Master desencadeará uma crise política e financeira no DF, com renúncia de Ibaneis Rocha, contaminação do BRB, investigações federais expondo esquemas de lavagem de dinheiro e reconfiguração do cenário eleitoral para 2026.
          - generic [ref=e301]:
            - generic [ref=e302]:
              - generic [ref=e303] [cursor=pointer]:
                - generic [ref=e304]: "01"
                - 'heading "Colapso Institucional e Renúncia Política: O Desdobramento Imediato da Crise" [level=3] [ref=e305]'
                - img [ref=e383]
              - generic [ref=e593]:
                - paragraph [ref=e594]: A simulação prevê que o desdobramento imediato da crise do Banco Master no Distrito Federal será marcado por uma rápida sucessão de eventos que corroem a base de sustentação política do governador Ibaneis Rocha, culminando em sua renúncia. A pressão surge de múltiplas frentes, tornando a contenção da crise impossível.
                - paragraph [ref=e595]:
                  - strong [ref=e596]: A contaminação do BRB e o gatilho financeiro
                  - text: As primeiras evidências de que o esquema de lavagem de dinheiro do Banco Master tinha ramificações no Banco de Brasília (BRB) surgem através de vazamentos seletivos para a imprensa e de relatórios preliminares de agências de risco. A exposição do BRB a operações suspeitas e a possibilidade de prejuízos bilionários geram pânico no mercado e uma corrida por informações por parte de investidores e correntistas.
                - blockquote [ref=e597]: "\"Um analista de risco expressou no Twitter: 'Os dados preliminares são devastadores. O BRB não era um player isolado; havia uma via de mão dupla com o Master. A governança colapsou onde deveria ser mais forte.'\""
                - paragraph [ref=e598]: A reação imediata do governo do DF é negar qualquer irregularidade, mas a perda de credibilidade é instantânea. A oposição política, até então fragmentada, encontra um ponto de convergência e amplifica as acusações, ligando a suposta leniência da administração a um conluio para proteger aliados.
                - paragraph [ref=e599]:
                  - strong [ref=e600]: A pressão investigativa e midiática insustentável
                  - text: As investigações federais, que inicialmente focavam no Banco Master, rapidamente direcionam seus holofotes para figuras próximas ao governo do DF. Indícios de que recursos desviados teriam financiado campanhas políticas e beneficiado empresas com contratos públicos transformam o caso de um escândalo financeiro em uma crise política de primeira magnitude.
                - blockquote [ref=e601]: "\"Um jornalista investigativo postou: 'As pontas soltas do Master levam direto ao Palácio do Buriti. Não são mais suspeitas vagas; são trilhas documentais. A cada dia, um novo nome é citado.'\""
                - paragraph [ref=e602]: A cobertura da mídia se torna incessante e predatória para o governo. A narrativa pública se cristaliza em torno da ideia de um "sistema de corrupção" enraizado no DF, com Ibaneis Rocha sendo retratado ou como um participante direto ou como um governador incompetente que permitiu a corrupção florescer sob seu nariz.
                - paragraph [ref=e603]:
                  - strong [ref=e604]: A ruptura da base de apoio e a renúncia
                  - text: O colapso institucional se consuma quando a base política de Ibaneis começa a se desintegrar. Aliados históricos, temendo serem arrastados pela lama do escândalo e preocupados com suas próprias reeleições em 2026, passam a defender publicamente uma "renúncia para preservar a institucionalidade". No Legislativo local, rumores de um pedido de impeachment ganham força, criando um cenário de paralisia administrativa.
                - blockquote [ref=e605]: "\"Um deputado distrital da base governista, em off para um blog, afirmou: 'O navio está afundando. Ou ele salta sozinho, ou vamos todos afundar com ele. A conversa nos bastidores é apenas sobre como fazer essa transição sem mais traumas.'\""
                - paragraph [ref=e606]: Diante da fuga de aliados, da pressão popular nas ruas e nas redes sociais, e da iminência de um processo de impeachment que mancharia definitivamente sua biografia, Ibaneis Rocha anuncia sua renúncia em um pronunciamento breve e solene. A simulação indica que ele tentará enquadrar a decisão como um ato de responsabilidade para "não prejudicar ainda mais o Distrito Federal", mas a opinião pública e a mídia interpretarão o ato como uma admissão tácita de culpa ou falência administrativa.
                - paragraph [ref=e607]:
                  - strong [ref=e608]: O vácuo de poder e a ascensão de Celina Leão
                  - text: Com a renúncia, assume a governadora em exercício, Celina Leão. No entanto, a simulação prevê que ela herdará não apenas o cargo, mas toda a carga de desconfiança e crise. Sua primeira reação será anunciar uma "auditoria independente e profunda" no BRB e um "governo de transição focado na normalização administrativa". Contudo, sua associação prévia com Ibaneis a coloca sob suspeita imediata.
                - blockquote [ref=e609]: "\"Um usuário influente no Reddit comentou: 'Trocar o piloto não conserta o avião com motor em chamas. Ela era parte da equipe de comando. Agora quer nos fazer acreditar que vai investigar a si mesma?'\""
                - paragraph [ref=e610]: O cenário imediato pós-renúncia é de um governo fragilizado, com legitimidade questionada, tentando administrar uma crise financeira no BRB enquanto se submete ao cerco de investigações federais que continuam avançando. A renúncia de Ibaneis, portanto, não é o fim da crise, mas a confirmação oficial do colapso institucional e o início de uma nova e instável fase política no DF.
