name: mirofish-inteia
services:
  # ---------- Neo4j (banco de grafos para o Graphiti) ----------
  neo4j:
    image: neo4j:5-community
    container_name: mirofish-neo4j
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-mirofish2026}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-mirofish2026}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------- Graphiti Server (grafo de memória temporal) ----------
  graphiti:
    image: zepai/graphiti:latest
    container_name: mirofish-graphiti
    restart: always
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-mirofish2026}
      - OPENAI_API_KEY=${LLM_API_KEY:-ollama}
      - OPENAI_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - MODEL_NAME=${GRAPHITI_MODEL:-gemma4:e2b}
      - SMALL_MODEL_NAME=${GRAPHITI_MODEL:-gemma4:e2b}
      - EMBEDDER_MODEL_NAME=nomic-embed-text
      - PORT=8000
    ports:
      - "8003:8000"
    volumes:
      - ./graphiti_patches/ingest.py:/app/graph_service/routers/ingest.py:ro
      - ./graphiti_patches/zep_graphiti.py:/app/graph_service/zep_graphiti.py:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ---------- Mirofish INTEIA ----------
  mirofish:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mirofish-inteia
    restart: always
    depends_on:
      graphiti:
        condition: service_started
    ports:
      - "4000:80"
      - "5001:5001"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-4o-mini}
      - LLM_MODEL_ALIASES=${LLM_MODEL_ALIASES:-}
      - LLM_AGENT_MODEL=${LLM_AGENT_MODEL:-gpt-4o-mini}
      - LLM_PREMIUM_MODEL=${LLM_PREMIUM_MODEL:-gpt-4o-mini}
      - LLM_HELENA_MODEL=${LLM_HELENA_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      - OMNIROUTE_URL=${OMNIROUTE_URL:-}
      - OMNIROUTE_API_KEY=${OMNIROUTE_API_KEY:-}
      - GRAPHITI_BASE_URL=http://graphiti:8000
      - GRAPHITI_TIMEOUT=${GRAPHITI_TIMEOUT:-120}
      - GRAPHITI_REQUIRED=${GRAPHITI_REQUIRED:-false}
      - ZEP_BASE_URL=${ZEP_BASE_URL:-}
      - ZEP_API_KEY=${ZEP_API_KEY:-}
      - ZEP_MODE=${ZEP_MODE:-disabled}
      - ZEP_REQUIRED=${ZEP_REQUIRED:-false}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-inteia-mirofish-token}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health/public"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  neo4j_data:
  neo4j_logs:
